            <div class="toggle-container">

                  Персонаж

                  </svg>
                </label>
      
                <input type="radio" id="clothes" name="toggle" value="Одежда" />

                  Одежда
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
